name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Version Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pubspec version is bumped
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "Current version: $CURRENT"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$LAST_TAG" != "none" ]; then
            TAGGED_VER=$(git show "$LAST_TAG":pubspec.yaml | grep '^version:' | awk '{print $2}')
            if [ "$CURRENT" = "$TAGGED_VER" ]; then
              echo "❌ pubspec.yaml version ($CURRENT) 未遞增（上次 tag: $TAGGED_VER）"
              exit 1
            fi
          fi
          echo "✅ Version OK: $CURRENT"

  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.1'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart analyze
        run: dart analyze --fatal-infos

      - name: Flutter test
        run: flutter test
