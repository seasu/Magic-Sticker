name: Generate Style×Emotion Preview Images

# 產生 6 種風格 × 16 種情感 = 96 張示意圖（preview_{style}_{emotion}.png）
# 可手動觸發，也支援只產生部分組合以節省 API 用量。

on:
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: '強制重新生成（即使圖片已存在）'
        type: boolean
        default: false
      styles:
        description: '只產生指定風格（空格分隔，留空=全部）例：chibi pixel'
        type: string
        default: ''
      emotions:
        description: '只產生指定情感（空格分隔，留空=全部）例：greeting happy angry'
        type: string
        default: ''

jobs:
  generate:
    name: Generate Preview Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if images already exist
        id: check
        run: |
          STYLES="${{ github.event.inputs.styles }}"
          EMOTIONS="${{ github.event.inputs.emotions }}"
          # 若未指定則用全量
          if [ -z "$STYLES" ]; then
            STYLES="chibi popArt pixel sketch watercolor photo"
          fi
          if [ -z "$EMOTIONS" ]; then
            EMOTIONS="greeting praise surprise awkward angry happy thinking farewell shy cool tired cry love excited scared mischief"
          fi

          MISSING=0
          for s in $STYLES; do
            for e in $EMOTIONS; do
              if [ ! -f "assets/images/preview_${s}_${e}.png" ] || \
                 [ "${{ github.event.inputs.force_regenerate }}" = "true" ]; then
                MISSING=1
                break 2
              fi
            done
          done
          echo "needs_generation=$MISSING" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.needs_generation == '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install google-genai
        if: steps.check.outputs.needs_generation == '1'
        run: pip install google-genai -q

      - name: Generate style×emotion preview images
        if: steps.check.outputs.needs_generation == '1'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL || 'gemini-2.5-flash-image' }}
          PREVIEW_STYLES: ${{ github.event.inputs.styles }}
          PREVIEW_EMOTIONS: ${{ github.event.inputs.emotions }}
        run: python3 scripts/generate_style_previews_ci.py

      - name: Create PR with generated images
        if: steps.check.outputs.needs_generation == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/cat_source.png assets/images/preview_*.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # 遞增版號（patch +1, build +1）以通過 Version Guard
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          MAJOR_MINOR=$(echo "$CURRENT" | sed 's/\([0-9]*\.[0-9]*\.\)\([0-9]*\)+\([0-9]*\)/\1/')
          PATCH=$(echo "$CURRENT" | sed 's/[0-9]*\.[0-9]*\.\([0-9]*\)+.*/\1/')
          BUILD=$(echo "$CURRENT" | sed 's/.*+//')
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD + 1))
          NEW_VER="${MAJOR_MINOR}${NEW_PATCH}+${NEW_BUILD}"
          sed -i "s/^version: .*/version: ${NEW_VER}/" pubspec.yaml
          sed -i "s/| 目前版本 | v[^ ]* |/| 目前版本 | v${NEW_VER} |/" PRD.md
          git add pubspec.yaml PRD.md
          echo "📦 Version bumped: $CURRENT → $NEW_VER"

          BRANCH="auto/style-emotion-previews-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "feat: add AI-generated style×emotion preview images (v${NEW_VER})"
          git push origin "$BRANCH"
          PR_BODY=$(printf '由 **Generate Style×Emotion Preview Images** workflow 自動產生。\n\n包含 6 種風格 × 16 種情感 = 96 張示意圖（preview_{style}_{emotion}.png）。\n\nPrompt 格式與 App 實際產圖一致，示意圖呈現效果忠實反映正式貼圖風格。')
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat: add AI-generated style x emotion preview images" \
            --body "$PR_BODY"
          echo "✅ PR created from branch $BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip message
        if: steps.check.outputs.needs_generation == '0'
        run: echo "✅ All preview images already exist. Use force_regenerate=true to regenerate."
