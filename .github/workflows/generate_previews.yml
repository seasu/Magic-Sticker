name: Generate Style Preview Images

# 一次性 workflow：使用 Gemini AI 生成 6 種風格貓咪示意圖並 commit 回 repo。
# 成功執行一次後，可刪除此 workflow 與 scripts/generate_style_previews_ci.py。

on:
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: '強制重新生成（即使圖片已存在）'
        type: boolean
        default: false

jobs:
  generate:
    name: Generate Preview Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if images already exist
        id: check
        run: |
          STYLES="chibi popArt pixel sketch watercolor photo"
          MISSING=0
          for s in $STYLES; do
            if [ ! -f "assets/images/preview_${s}.png" ] || \
               [ "${{ github.event.inputs.force_regenerate }}" = "true" ]; then
              MISSING=1
              break
            fi
          done
          echo "needs_generation=$MISSING" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.needs_generation == '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install google-genai
        if: steps.check.outputs.needs_generation == '1'
        run: pip install google-genai -q

      - name: Generate style preview images
        if: steps.check.outputs.needs_generation == '1'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL || 'gemini-2.5-flash-image' }}
        run: python3 scripts/generate_style_previews_ci.py

      - name: Create PR with generated images
        if: steps.check.outputs.needs_generation == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/cat_source.png assets/images/preview_*.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          BRANCH="auto/style-previews-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "feat: add AI-generated style preview images"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat: add AI-generated style preview images" \
            --body "由 **Generate Style Preview Images** workflow 自動產生。\n\n包含 6 種風格示意圖（chibi / popArt / pixel / sketch / watercolor / photo）。"
          echo "✅ PR created from branch $BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip message
        if: steps.check.outputs.needs_generation == '0'
        run: echo "✅ All preview images already exist. Use force_regenerate=true to regenerate."
