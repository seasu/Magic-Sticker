name: MagicMorning CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  # ─── Android Build ────────────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.1'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: |
          # 若前景圖不存在，降級使用完整圖（避免 CI 失敗）
          if [ ! -f assets/app_icon_fg.png ]; then
            cp assets/app_icon.png assets/app_icon_fg.png
          fi
          dart run flutter_launcher_icons

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "❌ ERROR: GOOGLE_SERVICES_JSON_ANDROID secret is not set"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          # 驗證 JSON 格式與必要欄位
          python3 - <<'PYEOF'
import json, sys
try:
    data = json.load(open("android/app/google-services.json"))
except json.JSONDecodeError as e:
    print(f"❌ google-services.json is not valid JSON: {e}")
    sys.exit(1)
if "project_info" not in data:
    print("❌ google-services.json is missing 'project_info' — please re-download from Firebase Console")
    sys.exit(1)
proj = data["project_info"].get("project_id", "")
if "placeholder" in proj:
    print(f"❌ google-services.json still uses placeholder project '{proj}' — upload the real file")
    sys.exit(1)
print(f"✅ google-services.json OK  project_id={proj}")
PYEOF

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload mapping.txt
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: android-mapping
          path: build/app/outputs/mapping/release/mapping.txt

  # ─── GitHub Release（每次 main 推送自動發佈）───────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec.yaml
        id: ver
        run: |
          RAW=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "raw=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=v$RAW"  >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/

      - name: Rename APK with version
        run: mv dist/app-release.apk "dist/MagicMorning-${{ steps.ver.outputs.raw }}.apk"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "MagicMorning ${{ steps.ver.outputs.raw }}"
          body: |
            ## 📦 MagicMorning `${{ steps.ver.outputs.raw }}`

            > 自動建置 · commit `${{ github.sha }}`

            ### 安裝方式
            1. 下載下方 `MagicMorning-*.apk`
            2. 手機開啟「允許安裝未知來源」
            3. 點擊 APK 安裝
          files: "dist/MagicMorning-${{ steps.ver.outputs.raw }}.apk"
          make_latest: true
          fail_on_unmatched_files: true

  # ─── Cloud Functions Deploy ────────────────────────────────
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install Functions dependencies
        run: cd functions && npm install

      - name: Build Functions
        run: cd functions && npm run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

  # ─── Firebase App Distribution ────────────────────────────
  firebase-distribute:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: dist/app-release.apk
          releaseNotes: |
            版本：${{ github.ref_name }}
            Commit：${{ github.sha }}

  # ─── Firebase Hosting Deploy（隱私政策頁面）──────────────────
  deploy-hosting:
    name: Deploy Hosting (Privacy Policy)
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

  # ─── iOS Build（暫停：待取得 Apple Developer 帳號後啟用）────
