name: MagicMorning CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ─── 版本號守衛 ────────────────────────────────────────
  version-check:
    name: Version Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pubspec version is bumped
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "Current version: $CURRENT"
          # 與上一個 tag 比較，若版本相同則拒絕
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$LAST_TAG" != "none" ]; then
            TAGGED_VER=$(git show "$LAST_TAG":pubspec.yaml | grep '^version:' | awk '{print $2}')
            if [ "$CURRENT" = "$TAGGED_VER" ]; then
              echo "❌ pubspec.yaml version ($CURRENT) 未遞增（上次 tag: $TAGGED_VER）"
              exit 1
            fi
          fi
          echo "✅ Version OK: $CURRENT"

  # ─── Android Build ────────────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart analyze
        run: dart analyze --fatal-infos

      - name: Flutter test
        run: flutter test

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Build APK (release)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY

      - name: Build AAB (release)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build appbundle --release \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload mapping.txt to Firebase Crashlytics
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: android-mapping
          path: build/app/outputs/mapping/release/mapping.txt

  # ─── iOS Build（暫停：待取得 Apple Developer 帳號後啟用）────
