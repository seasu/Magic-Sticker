name: MagicMorning CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  # ─── Android Build ────────────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.1'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "❌ ERROR: GOOGLE_SERVICES_JSON_ANDROID secret is not set"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          python3 -c "import json,sys; d=json.load(open('android/app/google-services.json')); assert 'project_info' in d, 'missing project_info'; p=d['project_info'].get('project_id',''); assert 'placeholder' not in p, 'placeholder project: '+p; print('OK project_id='+p)"

      - name: Setup Android Release Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️ WARNING: ANDROID_KEYSTORE_BASE64 not set, using debug signing"
          else
            echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
            cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=../upload-keystore.jks
          EOF
            echo "✅ Release keystore configured"
          fi

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload mapping.txt
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: android-mapping
          path: build/app/outputs/mapping/release/mapping.txt

  # ─── GitHub Release（每次 main 推送自動發佈）───────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec.yaml
        id: ver
        run: |
          RAW=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "raw=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=v$RAW"  >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/

      - name: Rename APK with version
        run: mv dist/app-release.apk "dist/MagicMorning-${{ steps.ver.outputs.raw }}.apk"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "MagicMorning ${{ steps.ver.outputs.raw }}"
          body: |
            ## 📦 MagicMorning `${{ steps.ver.outputs.raw }}`

            > 自動建置 · commit `${{ github.sha }}`

            ### 安裝方式
            1. 下載下方 `MagicMorning-*.apk`
            2. 手機開啟「允許安裝未知來源」
            3. 點擊 APK 安裝
          files: "dist/MagicMorning-${{ steps.ver.outputs.raw }}.apk"
          make_latest: true
          fail_on_unmatched_files: true

  # ─── Cloud Functions Deploy ────────────────────────────────
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install Functions dependencies
        run: cd functions && npm install

      - name: Generate functions/.env from GitHub Variables
        run: |
          cat > functions/.env <<EOF
          GEMINI_TEXT_MODEL=${{ vars.GEMINI_TEXT_MODEL || 'gemini-2.0-flash-lite' }}
          GEMINI_IMAGE_MODEL=${{ vars.GEMINI_IMAGE_MODEL || 'gemini-2.5-flash-image' }}
          EOF
          sed -i 's/^[[:space:]]*//' functions/.env
          echo "Generated functions/.env:"
          cat functions/.env

      - name: Build Functions
        run: cd functions && npm run build

      - name: Deploy Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --force --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Deploy Firestore Rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        continue-on-error: true

      - name: Smoke test — verify Cloud Functions are live
        run: |
          REGION="asia-east1"
          PROJECT="${{ secrets.FIREBASE_PROJECT_ID }}"
          URL="https://${REGION}-${PROJECT}.cloudfunctions.net/getConfig"

          echo "🔍 Calling getConfig: $URL"
          RESP=$(curl -sf -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d '{"data":{}}' \
            --max-time 30) || {
            echo "❌ getConfig unreachable or returned error"
            exit 1
          }

          echo "📦 Response: $RESP"

          TEXT_MODEL=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['textModel'])" 2>/dev/null)
          IMAGE_MODEL=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['imageModel'])" 2>/dev/null)

          if [ -z "$TEXT_MODEL" ] || [ -z "$IMAGE_MODEL" ]; then
            echo "❌ getConfig returned unexpected format"
            echo "$RESP"
            exit 1
          fi

          echo "✅ Cloud Functions alive"
          echo "   Text model:  $TEXT_MODEL"
          echo "   Image model: $IMAGE_MODEL"

  # ─── Firebase App Distribution ────────────────────────────
  firebase-distribute:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: dist/app-release.apk
          releaseNotes: |
            版本：${{ github.ref_name }}
            Commit：${{ github.sha }}

  # ─── Firebase Hosting Deploy（隱私政策頁面）──────────────────
  deploy-hosting:
    name: Deploy Hosting (Privacy Policy)
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

  # ─── iOS Build（暫停：待取得 Apple Developer 帳號後啟用）────
