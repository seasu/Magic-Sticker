name: magic_morning
description: 自動去背 LINE 貼圖產生器 — MagicMorning
publish_to: 'none'
version: 2.0.10+34

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Image handling
  image_picker: ^1.1.2
  image: ^4.1.7
  path_provider: ^2.1.3

  # Firebase
  firebase_core: ^3.3.0
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.2.0

  # AI 文案 & 圖片生成
  google_generative_ai: ^0.4.3
  http: ^1.2.0

  cupertino_icons: ^1.0.8

  # UI helpers
  gap: ^3.0.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1

  # Storage & export
  shared_preferences: ^2.3.2
  gal: ^1.1.0

  # Permissions
  permission_handler: ^11.3.1

  # App info
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
