name: magic_sticker
description: AI 一鍵產 LINE 貼圖 — Magic Sticker
publish_to: 'none'
version: 3.0.23+118

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Image handling
  image_picker: ^1.1.2
  image: ^4.1.7
  path_provider: ^2.1.3

  # Firebase
  firebase_core: ^3.3.0
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.2.0

  # AI 文案 & 圖片生成（透過 Cloud Functions 代理，App 不含 API Key）
  cloud_functions: ^5.1.3

  cupertino_icons: ^1.0.8

  # UI helpers
  gap: ^3.0.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1

  # Storage & export
  shared_preferences: ^2.3.2
  gal: ^1.1.0

  # Permissions
  permission_handler: ^11.3.1

  # App info
  package_info_plus: ^8.0.0

  # Ads & Monetization
  google_mobile_ads: ^5.3.0

  # Auth & Cloud Database
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false   # Phase 2：iOS 目錄尚未初始化
  image_path: "assets/app_icon.png"
  min_sdk_android: 26
  adaptive_icon_background: "#F8C8D4"
  adaptive_icon_foreground: "assets/app_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/

  # ── 本地繁體中文字型（全部 SIL OFL 授權）────────────────────────────────────
  fonts:
    # jf 開放粉圓 2.1 — 台灣最流行開源圓體，完整繁體中文字集
    # 來源: https://github.com/justfont/open-huninn-font
    - family: OpenHuninn
      fonts:
        - asset: assets/fonts/jf-openhuninn-2.1.ttf

    # Cubic 11（區域圓體）— 像素風圓角黑體，活潑可愛感
    # 來源: https://github.com/ACh-K/Cubic-11
    - family: Cubic11
      fonts:
        - asset: assets/fonts/Cubic_11.ttf

    # 芫荽（Iansui）— 楷書手寫風，完整繁體中文字集
    # 來源: https://github.com/ButTaiwan/iansui
    - family: Iansui
      fonts:
        - asset: assets/fonts/Iansui-Regular.ttf
